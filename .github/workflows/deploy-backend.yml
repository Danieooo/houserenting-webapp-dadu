name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering Render deploy for backend..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          echo "Render API response code: $RESPONSE"
          
          if [ "$RESPONSE" = "201" ]; then
            echo "✅ Deploy triggered successfully on Render!"
          else
            echo "❌ Deploy trigger failed with HTTP $RESPONSE"
            exit 1
          fi

      - name: Wait and verify deploy started
        run: |
          echo "⏳ Deploy has been queued on Render."
          echo "Monitor progress at: https://dashboard.render.com"
