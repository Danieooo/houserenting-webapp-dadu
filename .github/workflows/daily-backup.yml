name: Daily Database Backup to Google Drive

on:
  schedule:
    - cron: '0 19 * * *'  # 19:00 UTC is 02:00 AM ICT (Vietnam time)
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

jobs:
  backup:
    name: Database Extract & Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (pg & googleapis)
        run: |
          npm install --no-save pg googleapis

      - name: Extract Database & Upload to Google Drive
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          node scripts/backup-to-gdrive.js
